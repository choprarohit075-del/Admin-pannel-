<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 5px;
    }
    input {
      width: 220px;
    }
    button {
      background: #00ff99;
      cursor: pointer;
      font-weight: bold;
    }
    .box {
      background: #222;
      padding: 25px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>

  <h1>🔥 Admin Panel</h1>

  <div class="box">
    <h3>Create Key</h3>

    <input type="text" id="key" placeholder="Enter Key"><br>
    <input type="number" id="days" placeholder="Days"><br>

    <button onclick="createKey()">Create Key</button>

    <p id="result"></p>
  </div>

  <script>
    async function createKey() {
      let key = document.getElementById("key").value;
      let days = document.getElementById("days").value;

      if (!key || !days) {
        document.getElementById("result").innerText = "❌ Fill all fields";
        return;
      }

      try {
        let res = await fetch("https://admin-pannel-gi9e.onrender.com/create-key", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ key, days })
        });

        let data = await res.json();

        if (data.status === "created") {
          document.getElementById("result").innerText =
            "✅ Key Created: " + data.key;
        } else {
          document.getElementById("result").innerText =
            "❌ Error: " + JSON.stringify(data);
        }

      } catch (err) {
        document.getElementById("result").innerText =
          "❌ Server Error (check backend)";
      }
    }
  </script>

</body>
</html>

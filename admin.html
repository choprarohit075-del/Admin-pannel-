<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
      padding: 50px;
    }
    input, button {
      padding: 10px;
      margin: 10px;
      border: none;
      border-radius: 5px;
    }
    input {
      width: 200px;
    }
    button {
      background: #00ff99;
      cursor: pointer;
      font-weight: bold;
    }
    .box {
      background: #222;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>

  <h1>🔥 Admin Panel</h1>

  <div class="box">
    <h3>Create Key</h3>

    <input type="text" id="key" placeholder="Enter Key"><br>
    <input type="number" id="days" placeholder="Days"><br>

    <button onclick="createKey()">Create Key</button>

    <p id="result"></p>
  </div>

  <script>
    async function createKey() {
      let key = document.getElementById("key").value;
      let days = document.getElementById("days").value;

      let res = await fetch("/create-key", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ key, days })
      });

      let data = await res.json();

      if (data.status === "created") {
        document.getElementById("result").innerText =
          "✅ Key Created: " + data.key;
      } else {
        document.getElementById("result").innerText =
          "❌ Error";
      }
    }
  </script>

</body>
</html>

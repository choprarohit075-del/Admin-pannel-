<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body style="background:black;color:white;text-align:center;padding:50px;">

<h1>Admin Panel</h1>

<input id="key" placeholder="Enter Key"><br><br>
<input id="days" type="number" placeholder="Days"><br><br>

<button onclick="createKey()">Create Key</button>

<p id="result"></p>

<script>
async function createKey() {
  let key = document.getElementById("key").value;
  let days = parseInt(document.getElementById("days").value);

  if (!key || !days) {
    document.getElementById("result").innerText = "❌ Fill all fields";
    return;
  }

  try {
    let res = await fetch("/create-key", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ key, days })
    });

    let data = await res.json();

    document.getElementById("result").innerText =
      JSON.stringify(data);

  } catch (err) {
    document.getElementById("result").innerText = "❌ Server Error";
  }
}
</script>

</body>
</html>

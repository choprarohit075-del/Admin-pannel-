<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body style="background:black;color:white;text-align:center;padding:50px;">

<h1>Admin Panel</h1>

<input id="key" placeholder="Enter Key"><br><br>
<input id="days" placeholder="Days"><br><br>

<button onclick="createKey()">Create Key</button>

<p id="result"></p>

<script>
async function createKey() {
  console.log("Button clicked"); // 🔥 debug

  let key = document.getElementById("key").value;
  let days = document.getElementById("days").value;

  console.log(key, days); // 🔥 debug

  try {
    let res = await fetch("/create-key", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ key, days })
    });

    let data = await res.json();

    console.log(data); // 🔥 debug

    document.getElementById("result").innerText =
      JSON.stringify(data);

  } catch (err) {
    console.log(err);
    document.getElementById("result").innerText = "Error";
  }
}
</script>

</body>
</html>
